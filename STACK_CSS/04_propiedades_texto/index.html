    <header>

      <h3 class="textoDerecha">Esto es un texto alineado a la derecha</h3>

      <p>Ejemplo 2: Esto es un <a href="#" class="sinDecoracion">link</a></p>
      <p>Ejemplo 3: <span class="subtitulo1">Subrayado y cursiva</span></p>
      <p>Ejemplo 4:<span class =".negrita">Negrita</span></p>
      <p>Ejemplo 5:<span class =".semiNegrita">Fuente más delgada</span></p>
